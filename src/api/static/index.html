<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中医 AI 助手</title>
<style>
:root {
  --bg: #f5f3ed;
  --card: #fff;
  --primary: #5b8c5a;
  --primary-hover: #4a7a49;
  --danger: #c0392b;
  --user-bubble: #e6f3e3;
  --tool-bg: #fef9e7;
  --tool-border: #e8d5a0;
  --border: #e0d8cc;
  --text: #333;
  --text-light: #888;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg); color:var(--text); height:100vh;
  display:flex; justify-content:center; align-items:center;
}

/* ── 登录/注册卡片 ── */
.auth-container { display:flex; flex-direction:column; align-items:center; gap:10px; }
.auth-card {
  background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:40px 36px; width:380px; text-align:center;
}
.auth-card .logo { font-size:40px; margin-bottom:8px; }
.auth-card h1 { font-size:22px; color:var(--primary); margin-bottom:6px; }
.auth-card .sub { font-size:13px; color:var(--text-light); margin-bottom:24px; }

.form-group { text-align:left; margin-bottom:16px; }
.form-group label { display:block; font-size:13px; color:var(--text-light); margin-bottom:4px; }
.form-group input {
  width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px;
  font-size:14px; outline:none; transition:border 0.2s;
}
.form-group input:focus { border-color:var(--primary); }

.btn {
  width:100%; padding:11px; border:none; border-radius:8px; font-size:15px; font-weight:500;
  cursor:pointer; transition:all 0.2s;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; }

.auth-card .switch {
  margin-top:16px; font-size:13px; color:var(--text-light);
}
.auth-card .switch a { color:var(--primary); cursor:pointer; text-decoration:none; font-weight:500; }
.auth-card .switch a:hover { text-decoration:underline; }
.error-msg { color:var(--danger); font-size:13px; margin-bottom:8px; display:none; }
.error-msg.show { display:block; }

/* ── 主体布局 ── */
.app-layout { display:none; width:100vw; height:100vh; }
.app-layout.active { display:flex; }

/* Sidebar */
.sidebar {
  width:260px; background:#2c3e2d; color:#c8d6c0; display:flex;
  flex-direction:column; flex-shrink:0;
}
.sidebar-header {
  padding:18px; border-bottom:1px solid rgba(255,255,255,.1);
  display:flex; align-items:center; gap:8px;
}
.sidebar-header .logo { font-size:22px; }
.sidebar-header h2 { font-size:15px; color:#fff; }
.sidebar-new {
  margin:10px 14px; padding:8px; border:1px dashed rgba(255,255,255,.3);
  border-radius:8px; text-align:center; cursor:pointer; font-size:13px;
  transition:all .2s;
}
.sidebar-new:hover { background:rgba(255,255,255,.06); }
.sessions { flex:1; overflow-y:auto; padding:4px 8px; }
.session-item {
  padding:10px 12px; border-radius:8px; cursor:pointer; font-size:13px;
  margin:2px 0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}
.session-item:hover { background:rgba(255,255,255,.08); }
.session-item.active { background:rgba(255,255,255,.15); color:#fff; }

.sidebar-footer {
  padding:14px 16px; border-top:1px solid rgba(255,255,255,.1);
  display:flex; justify-content:space-between; align-items:center; font-size:12px;
}
.sidebar-footer .user { opacity:.7; }
.sidebar-footer .logout { color:#e8a0a0; cursor:pointer; }
.sidebar-footer .logout:hover { text-decoration:underline; }

/* Chat area */
.chat-area { flex:1; display:flex; flex-direction:column; min-width:0; background:#fafaf7; }
.chat-header {
  padding:14px 24px; background:#fff; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px; font-size:14px; font-weight:600;
}
.chat-header .dot { width:8px; height:8px; border-radius:50%; background:var(--primary); }

.messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:14px; }

.msg { display:flex; gap:10px; max-width:85%; animation:fadeIn .3s ease; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg.ai { align-self:flex-start; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }

.msg .avatar {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:16px;
}
.msg.user .avatar { background:var(--primary); color:#fff; }
.msg.ai .avatar { background:#efe6da; }

.msg .bubble {
  padding:11px 15px; border-radius:var(--radius); font-size:14px; line-height:1.7;
  word-break:break-word; box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.msg.user .bubble { background:var(--user-bubble); border-bottom-right-radius:4px; }
.msg.ai .bubble { background:#fff; border-bottom-left-radius:4px; }

.msg .bubble .tool-call {
  margin:6px 0; padding:8px 12px; background:var(--tool-bg);
  border:1px solid var(--tool-border); border-radius:6px; font-size:12px;
  display:flex; align-items:flex-start; gap:6px;
}
.msg .bubble .tool-call .t-icon { font-size:14px; flex-shrink:0; }
.msg .bubble .tool-call .t-name { color:#b8860b; font-weight:500; }
.msg .bubble .tool-call .t-result { color:var(--text-light); margin-top:4px; }

.msg .bubble .typing { color:var(--text-light); font-style:italic; font-size:13px; }

/* ── 追踪面板 ── */
.trace-panel {
  margin-top:8px; border-top:1px dashed #e0d8cc; padding-top:6px;
  font-size:12px; color:var(--text-light);
}
.trace-toggle {
  cursor:pointer; display:flex; align-items:center; gap:4px;
  user-select:none; padding:2px 0;
}
.trace-toggle:hover { color:var(--primary); }
.trace-toggle .arrow { font-size:10px; transition:transform .2s; display:inline-block; }
.trace-toggle .arrow.open { transform:rotate(90deg); }
.trace-summary { font-weight:500; }
.trace-detail { display:none; margin-top:6px; }
.trace-detail.open { display:block; }
.trace-item {
  padding:4px 0; border-bottom:1px solid #f0ede5;
  display:flex; gap:8px; align-items:flex-start;
}
.trace-item:last-child { border-bottom:none; }
.trace-item .t-step {
  width:18px; height:18px; border-radius:50%; background:var(--tool-bg);
  border:1px solid var(--tool-border); flex-shrink:0;
  font-size:10px; text-align:center; line-height:16px;
}
.trace-item .t-info { flex:1; }
.trace-item .t-meta { color:#aaa; font-size:11px; }
.trace-item .t-output {
  margin-top:2px; padding:2px 6px; background:#fafaf7; border-radius:4px;
  font-size:11px; max-height:60px; overflow-y:auto; white-space:pre-wrap; word-break:break-all;
}

.input-area {
  padding:14px 24px; background:#fff; border-top:1px solid var(--border);
  display:flex; gap:10px;
}
.input-area textarea {
  flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:10px;
  font-size:14px; font-family:inherit; outline:none; resize:none;
  max-height:100px; line-height:1.5;
}
.input-area textarea:focus { border-color:var(--primary); }
.input-area button {
  padding:10px 18px; background:var(--primary); color:#fff; border:none;
  border-radius:10px; cursor:pointer; font-size:14px; font-weight:500;
  align-self:flex-end; transition:background .2s;
}
.input-area button:hover { background:var(--primary-hover); }
.input-area button:disabled { opacity:.6; cursor:not-allowed; }
</style>
</head>
<body>

<!-- ═══════════════ 登录 / 注册 ═══════════════ -->
<div id="auth-view" class="auth-container">
  <!-- 登录 -->
  <div class="auth-card" id="login-card">
    <div class="logo">🌿</div>
    <h1>中医 AI 助手</h1>
    <p class="sub">登录以开始对话</p>
    <div class="form-group"><label>用户名</label><input id="login-user" placeholder="输入用户名"></div>
    <div class="form-group"><label>密码</label><input id="login-pass" type="password" placeholder="输入密码"></div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">登 录</button>
    <p class="switch">还没有账号？<a onclick="showAuth('register')">立即注册</a></p>
  </div>
  <!-- 注册 -->
  <div class="auth-card" id="register-card" style="display:none">
    <div class="logo">🌿</div>
    <h1>创建账号</h1>
    <p class="sub">注册后即可使用中医 AI 助手</p>
    <div class="form-group"><label>用户名</label><input id="reg-user" placeholder="至少 2 位字符"></div>
    <div class="form-group"><label>邮箱（选填）</label><input id="reg-email" placeholder="your@email.com"></div>
    <div class="form-group"><label>密码</label><input id="reg-pass" type="password" placeholder="至少 6 位字符"></div>
    <div class="error-msg" id="reg-error"></div>
    <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">注 册</button>
    <p class="switch">已有账号？<a onclick="showAuth('login')">去登录</a></p>
  </div>
</div>

<!-- ═══════════════ 对话页面 ═══════════════ -->
<div class="app-layout" id="app-view">
  <aside class="sidebar">
    <div class="sidebar-header"><span class="logo">🌿</span><h2>中医 AI</h2></div>
    <div class="sidebar-new" onclick="newChat()">＋ 新对话</div>
    <div class="sessions" id="sessions"></div>
    <div class="sidebar-footer">
      <span class="user" id="sidebar-user"></span>
      <span class="logout" onclick="doLogout()">退出</span>
    </div>
  </aside>
  <div class="chat-area">
    <div class="chat-header"><span class="dot"></span> <span id="chat-title">新对话</span></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="msg-input" rows="1" placeholder="输入您的问题，按 Enter 发送，Shift+Enter 换行..."
        onkeydown="onKeyDown(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<script>
// ═══════════════ 全局状态 ═══════════════
const API = '';
let token = '';
let username = '';
let currentSessionId = '';
let chats = {};        // { sessionId: { title, messages:[] } }
let activeSession = null;
let isStreaming = false;

// ═══════════════ 认证 ═══════════════
function showAuth(view) {
  document.getElementById('login-card').style.display = view === 'login' ? '' : 'none';
  document.getElementById('register-card').style.display = view === 'register' ? '' : 'none';
  hideErrors();
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function hideErrors() {
  document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
}

async function doLogin() {
  hideErrors();
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (!u || !p) return showError('login-error', '请输入用户名和密码');

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '登录中...';

  try {
    const res = await fetch(API + '/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username:u, password:p })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '登录失败');

    token = data.access_token;
    username = data.username;
    localStorage.setItem('tcm_token', token);
    localStorage.setItem('tcm_username', username);
    onAuthSuccess();
  } catch(e) {
    showError('login-error', e.message);
  } finally {
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function doRegister() {
  hideErrors();
  const u = document.getElementById('reg-user').value.trim();
  const em = document.getElementById('reg-email').value.trim();
  const p = document.getElementById('reg-pass').value.trim();
  if (!u || !p) return showError('reg-error', '用户名和密码为必填项');
  if (u.length < 2) return showError('reg-error', '用户名至少 2 位字符');
  if (p.length < 6) return showError('reg-error', '密码至少 6 位字符');

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = '注册中...';

  try {
    const res = await fetch(API + '/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username:u, password:p, email:em || null })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '注册失败');

    token = data.access_token;
    username = data.username;
    localStorage.setItem('tcm_token', token);
    localStorage.setItem('tcm_username', username);
    onAuthSuccess();
  } catch(e) {
    showError('reg-error', e.message);
  } finally {
    btn.disabled = false; btn.textContent = '注 册';
  }
}

function doLogout() {
  token = ''; username = '';
  currentSessionId = ''; activeSession = null;
  chats = {};
  localStorage.removeItem('tcm_token');
  localStorage.removeItem('tcm_username');
  localStorage.removeItem('tcm_chats');
  document.getElementById('app-view').classList.remove('active');
  document.getElementById('auth-view').style.display = '';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

// ═══════════════ 进入对话 ═══════════════
function onAuthSuccess() {
  document.getElementById('auth-view').style.display = 'none';
  document.getElementById('app-view').classList.add('active');
  document.getElementById('sidebar-user').textContent = username;
  newChat();
}

function newChat() {
  currentSessionId = 'sess-' + Date.now();
  chats[currentSessionId] = { title: '新对话', messages: [] };
  activeSession = currentSessionId;
  renderSessions();
  renderMessages();
  saveState();
}

function switchChat(sid) {
  if (isStreaming) return;
  activeSession = sid;
  currentSessionId = sid;
  renderSessions();
  renderMessages();
}

function renderSessions() {
  const el = document.getElementById('sessions');
  el.innerHTML = Object.entries(chats).map(([sid, ch]) =>
    `<div class="session-item${sid === activeSession ? ' active' : ''}" onclick="switchChat('${sid}')">
      ${ch.title}
    </div>`
  ).join('');
  document.getElementById('chat-title').textContent = (chats[activeSession]?.title) || '新对话';
}

function renderMessages() {
  const el = document.getElementById('messages');
  const msgs = chats[activeSession]?.messages || [];
  el.innerHTML = msgs.map(m => renderMsgHTML(m)).join('');
  el.scrollTop = el.scrollHeight;
}

function renderMsgHTML(m) {
  if (m.role === 'user') {
    return `<div class="msg user"><div class="avatar">👤</div><div class="bubble">${escapeHTML(m.content)}</div></div>`;
  }
  return '<div class="msg ai"><div class="avatar">🌿</div><div class="bubble">' + renderMsgContent(m) + '</div></div>';
}

/** 只生成气泡内部 HTML（不含外层 div），用于流式更新时局部刷新 */
function renderMsgContent(m) {
  let html = '';
  if (m.toolCalls) {
    for (const tc of m.toolCalls) {
      html += `<div class="tool-call"><span class="t-icon">🔧</span><div>
        <span class="t-name">${escapeHTML(tc.name)}</span>
        ${tc.result ? `<div class="t-result">${escapeHTML(tc.result.slice(0,300))}${tc.result.length>300?'...':''}</div>` : ''}
      </div></div>`;
    }
  }
  html += `<span class="msg-text">${escapeHTML(m.content || '')}</span>`;
  if (m._streaming) html += '<span class="typing">▍</span>';
  return html;
}

/** 生成追踪面板 HTML（消息完成后显示） */
function renderTracePanel(m) {
  if (!m._trace || !m._trace.tools || m._trace.tools.length === 0) return '';
  const t = m._trace;
  let detail = '';
  t.tools.forEach((tool, i) => {
    detail += `<div class="trace-item">
      <div class="t-step">${i+1}</div>
      <div class="t-info">
        <span style="color:#b8860b;font-weight:500;">${escapeHTML(tool.name)}</span>
        <span class="t-meta">${tool.duration_ms}ms</span>`;
    if (tool.output_preview) {
      detail += `<div class="t-output">${escapeHTML(tool.output_preview.slice(0,300))}${tool.output_preview.length>300?'...':''}</div>`;
    }
    detail += `</div></div>`;
  });
  return `<div class="trace-panel">
    <div class="trace-toggle" onclick="toggleTrace(this)">
      <span class="arrow">▶</span>
      <span class="trace-summary">追踪: ${t.total_ms}ms 总耗时 · ${t.tool_count} 次工具调用</span>
    </div>
    <div class="trace-detail">${detail}</div>
  </div>`;
}

function toggleTrace(el) {
  const arrow = el.querySelector('.arrow');
  const detail = el.nextElementSibling;
  arrow.classList.toggle('open');
  detail.classList.toggle('open');
}

/** 局部更新最后一条 AI 气泡（不做全量 innerHTML 替换，避免闪烁） */
function updateLastAiBubble() {
  const container = document.getElementById('messages');
  const bubbles = container.querySelectorAll('.msg.ai .bubble');
  const lastBubble = bubbles[bubbles.length - 1];
  if (!lastBubble) return;
  const msgs = chats[activeSession]?.messages || [];
  const lastMsg = msgs[msgs.length - 1];
  if (!lastMsg) return;

  const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
  lastBubble.innerHTML = renderMsgContent(lastMsg) + renderTracePanel(lastMsg);
  if (wasAtBottom) container.scrollTop = container.scrollHeight;
}

function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/\n/g, '<br>');
}

// ═══════════════ 发送消息 ═══════════════
function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  isStreaming = true;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  input.style.height = 'auto';

  // 添加用户消息
  const chat = chats[activeSession];
  chat.messages.push({ role: 'user', content: text });
  if (chat.title === '新对话') chat.title = text.slice(0, 20) + (text.length > 20 ? '...' : '');
  renderSessions();

  // 创建 AI 消息骨架
  chat.messages.push({ role: 'ai', content: '', toolCalls: [], _streaming: true });
  renderMessages();

  try {
    const res = await fetch(API + '/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ message: text, session_id: currentSessionId })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    const aiMsg = chat.messages[chat.messages.length - 1];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      let needsUpdate = false;
      for (const line of buffer.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }

        needsUpdate = true;
        if (event.type === 'token') {
          aiMsg.content += event.content;
        } else if (event.type === 'tool_start') {
          if (!aiMsg.toolCalls) aiMsg.toolCalls = [];
          aiMsg.toolCalls.push({ name: event.tool_name, result: '' });
          // 初始化 trace 存储
          if (!aiMsg._trace) aiMsg._trace = { tools: [], total_ms: 0, tool_count: 0 };
        } else if (event.type === 'tool_end') {
          const tc = aiMsg.toolCalls?.[aiMsg.toolCalls.length - 1];
          if (tc) tc.result = event.tool_output || '';
          // 记录工具调用到 trace
          if (aiMsg._trace) {
            aiMsg._trace.tools.push({
              name: event.tool_name,
              duration_ms: event.duration_ms || 0,
              output_preview: (event.tool_output || '').slice(0, 500),
            });
          }
        } else if (event.type === 'done') {
          aiMsg._streaming = false;
          if (event.trace) {
            aiMsg._trace = {
              total_ms: event.trace.total_ms,
              tool_count: event.trace.tool_count,
              tools: event.trace.tools || [],
            };
          }
        } else if (event.type === 'error') {
          aiMsg.content += '\n\n\u26a0\ufe0f ' + (event.message || '出错了');
          aiMsg._streaming = false;
        }
      }
      // 先处理完所有事件再刷新 DOM（一处更新 + 每 chunk 一次）
      if (needsUpdate) updateLastAiBubble();

      buffer = buffer.includes('\n') ? buffer.substring(buffer.lastIndexOf('\n') + 1) : '';
    }
  } catch(e) {
    const aiMsg = chat.messages[chat.messages.length - 1];
    if (aiMsg._streaming) {
      aiMsg.content += '\n\n⚠️ 连接失败: ' + e.message;
      aiMsg._streaming = false;
      renderMessages();
    }
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
    saveState();
  }
}

// 自适应 textarea 高度
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// cookie 令牌恢复（可选）
const savedToken = localStorage.getItem('tcm_token');
const savedUser = localStorage.getItem('tcm_username');
const savedChats = localStorage.getItem('tcm_chats');
if (savedToken && savedUser) {
  token = savedToken;
  username = savedUser;
  if (savedChats) {
    try { chats = JSON.parse(savedChats); } catch(e) { chats = {}; }
  }
  // 自动进入应用界面
  document.getElementById('auth-view').style.display = 'none';
  document.getElementById('app-view').classList.add('active');
  document.getElementById('sidebar-user').textContent = username;
  // 恢复会话列表
  if (Object.keys(chats).length > 0) {
    activeSession = Object.keys(chats)[0];
    currentSessionId = activeSession;
    renderSessions();
    renderMessages();
  } else {
    newChat();
  }
}

function saveState() {
  localStorage.setItem('tcm_token', token);
  localStorage.setItem('tcm_username', username);
  localStorage.setItem('tcm_chats', JSON.stringify(chats));
}

</script>
</body>
</html>
