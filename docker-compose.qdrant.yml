# 中医 AI Agent - Qdrant 轻量部署
# 用法: docker-compose -f docker-compose.qdrant.yml up -d
#
# 仅需要 Qdrant 一个容器，无需 etcd/minio

version: "3.8"

services:
  # === Qdrant 向量数据库 ===
  qdrant:
    container_name: qdrant-tcm
    image: qdrant/qdrant:latest
    ports:
      - "7645:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  # === Neo4j 图数据库 ===
  neo4j:
    container_name: neo4j-tcm
    image: neo4j:5.26.0
    environment:
      NEO4J_AUTH: neo4j/zhongyi_neo4j_2026
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7644:7687"
    volumes:
      - ./neo4j_data/data:/data
      - ./neo4j_data/logs:/logs
    restart: unless-stopped

  # === 中医 AI Agent 服务 ===
  zhongyi-ai:
    container_name: zhongyi-ai
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
